<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Video Library</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:white;
}

header{
    background:#111;
    padding:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:#111;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:260px;
    object-fit:cover;
}

.card h3{
    padding:10px;
    font-size:18px;
}

#playerPage{
    display:none;
    padding:20px;
}

#playerPage img{
    width:200px;
    border-radius:10px;
    margin-bottom:15px;
}

video{
    width:100%;
    max-width:900px;
    border-radius:10px;
    margin-top:15px;
}

button{
    padding:10px 20px;
    border:none;
    background:#8b5cf6;
    color:white;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:20px;
}
</style>
</head>

<body>

<header>My Video Library</header>

<div id="homePage">

<div class="grid">

<div class="card"
onclick="openVideo(
'Anime Video 1',
'https://picsum.photos/300/450?1',
'videos/video1.mp4'
)">
<img src="https://picsum.photos/300/450?1">
<h3>Anime Video 1</h3>
</div>

<div class="card"
onclick="openVideo(
'Anime Video 2',
'https://picsum.photos/300/450?2',
'videos/video2.mp4'
)">
<img src="https://picsum.photos/300/450?2">
<h3>Anime Video 2</h3>
</div>

<div class="card"
onclick="openVideo(
'Anime Video 3',
'https://picsum.photos/300/450?3',
'videos/video3.mp4'
)">
<img src="https://picsum.photos/300/450?3">
<h3>Anime Video 3</h3>
</div>

</div>

</div>

<div id="playerPage">

<button onclick="goBack()">← Back</button>

<h1 id="videoTitle"></h1>

<br>

<img id="videoPoster">

<br>

<video id="videoPlayer" controls>
<source id="videoSource">
</video>

</div>

<script>

function openVideo(title, poster, video){

document.getElementById("homePage").style.display="none";
document.getElementById("playerPage").style.display="block";

document.getElementById("videoTitle").innerText=title;
document.getElementById("videoPoster").src=poster;

document.getElementById("videoSource").src=video;

let player=document.getElementById("videoPlayer");
player.load();

window.scrollTo(0,0);
}

function goBack(){
document.getElementById("playerPage").style.display="none";
document.getElementById("homePage").style.display="block";
}

</script>

</body>
</html>
